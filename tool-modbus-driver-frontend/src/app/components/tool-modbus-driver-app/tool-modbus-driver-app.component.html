@if (applicationNode) {
<div class="component">
    <div class="simulation">
        <h3 style="margin-left: 10px; margin-bottom: 20px;">Real</h3>
        <ur-toggle-switch [toggled]="this.applicationNode.isSimulation" [labelPos]="'before'"
            (handleToggle)="this.applicationNode.isSimulation = !this.applicationNode.isSimulation; saveNode()"></ur-toggle-switch>
        <h3>Simulation</h3>
    </div>
    <div class="section">
        <div class="field">
            <ur-dropdown [disabled]="this.applicationNode.isSimulation"
                [options]="options"
                [label]="'Baudrate'"
                [selectedOption]="this.applicationNode.baudrate"
                (selectionChange)="onBaudrateSelectionChange($event)"></ur-dropdown>
        </div>
        <div class="field">
            <ur-dialog-input [type]="'number'" [disabled]="this.applicationNode.isSimulation"
                [label]="'Device Address'"
                [message]="'Modbus slave device address'"
                [validators]="[]" [validation]="{required: true, min:1, max:255}"
                (valueChanged)="this.applicationNode.deviceAddress = +$event; saveNode()" [positiveDigitsOnly]="true"
                [value]="(applicationNode.deviceAddress ?? 1).toString()" unit="#" [precision]="1"></ur-dialog-input>
        </div>
    </div>
</div>
}
